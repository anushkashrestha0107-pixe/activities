<!DOCTYPE html>
<html>
<head>
   
<script>
function validateForm() {
    var x = document.forms["myForm"]["fname"].value;
    if (x == "") {
        alert("Please fill out the field");
        return false;
    }
}
</script>


</head>
<body>

<form name="myForm" onsubmit="return validateForm()">
  Name: <input type="text" name="fname">
  <input type="submit" value="Submit ">
</form>

<p id="message"></p>

</body>
</html>
