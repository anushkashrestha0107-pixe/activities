<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Evaluate variables</title>
</head>
<body>
    <h2>Evaluate Variables</h2>

    <p>Click the button below to evaluate the variables.</p>

    <button onclick="evaluate()">Evaluate</button>
    <p id="result"></p>
    <script>
        function evaluate() {
            var x = 5;
            var y = 10;
            var z = x + y;
            document.getElementById("result").innerHTML = "The sum of x and y is: " + z;
        }
    </script>
</body>
</html>
