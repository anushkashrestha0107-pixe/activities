    <p id="result"></p>
    <script>
        var myObj = {
            name: "Riya",
            age: 12,
            grade: 7
        };
        var myObject = JSON.stringify(myObj); // Convert the JavaScript object to a JSON string
        var newObject = JSON.parse(myObject); // Convert the JSON string back to a JavaScript object

        var jsonString = JSON.stringify(myObj); // Convert the JavaScript object to a JSON string
        document.getElementById("result").innerHTML = newObject.name;   // Accessing the name property of the new object
    </script>
