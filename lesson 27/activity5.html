<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hepling Tinu</title>
</head>
<style>

    
    .btn{
        border: 10px solid #ff6666;
        border-radius: 2px;
        background-color: #25140a;
        color: #ff6666;
        box-shadow: 0 5px 8px 2px #cc5454;
        transition: 0.3s all ease-in-out;
        transition: 0.5s box-shadow ease-in-out;
        cursor: pointer;
        padding: 20px 30px;
        font-size: 20px;

    }

    .btn:hover {
        background-color: #453b3b;
        color: #371602;
        box-shadow: 0 0 12px 12px #000000;
    }
       
   
    #result {
        margin-top: 20px;
        font-size: 18px;
        color: rgb(5, 23, 33);
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
    
         
}
h3 {
    color: rgb(5, 23, 33);
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
}
    
    
</style>
<body>
    <h2>Helping Tinu</h2>
    

    <button onclick="checkError()">Click me to try catch</button>
    <p id="result"></p>
    <script>
        function checkError() {
            try {
                var x = 10000000000;
                var y = 0;

                if (y == 0) {
                    throw "Something went wrong. Try checking your input values!";
                }
                var result = x / y;
                document.getElementById("result").innerHTML =  result;
            }
               catch (error) {
                    document.getElementById("result").innerHTML = "Error: " + error;
                }
                finally{
                    console.log("Execution completed.");
                }
            }
           
                </script>
             <h3>Congratulations! You learnt to catch the error!!</h3>

</body>
</html>
