<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Class Inheritance</title>
</head>
<body>
    <h2>Class Inheritance</h2>
    <p> A snack is a small amount of food, typically eaten between main meals, designed to satisfy hunger quickly. </p>
    <p> There are 3 types of snacks :  Confectionery, savory snacks, and healthy snack </p>
    <p id="details"></p>
    
    <script>
        class snacks
        {
            constructor(brand) {
                this.brand =     brand;
            }
            present() {
                return 'The best snack for me is ' + this.brand;
            }
        }
        class Model extends snacks
        {
            constructor(brand, mod) {
                super(brand);
                this.model = mod;
            }
            show() {
                return this.present() + ', but i like ' + this.model;
            }
        }
        let mysnack = new Model("Nuts", "Cookies");
        document.getElementById("details").innerHTML = mysnack.show();    
    </script>
    
</body>
</html>
