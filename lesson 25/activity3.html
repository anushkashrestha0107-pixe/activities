<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Static methods</title>
</head>
<body>
    <h2>Static methods</h2>
    <p> I learnt 3 languages.</p>
    <p id="hello(English)"></p>
    <p id="Namaste(Nepali)"></p>
    <p id="Nǐ hǎo(Chinese)"></p>
    <script>
        class Student {
            constructor(Anu) {
                this.studentname = Anu;
            }
            static hello(name) {// Static method
                return "Hello " + name + "!";
            }
            static namaste(x) {// Static method   
                return "Namaste, " + x.studentname;
            }
             static greet(x) {
                return "Hello, " + x.studentname + "!! Welcome to the world of JavaScript.";
            }
            static nihao(x) {
                return "Nǐ hǎo, " + x.studentname;
            }
            hi() {
                return "Hi, I am " + this.studentname;
            }
        }
 myname= new Student("Anu");
 // Call 'hello()' on the class student, not on the object myname because it is a static method and it cannot access object
    document.getElementById("hello(English)").innerHTML = Student.hello("Anu");
    // Call 'namaste()' on the class student
    document.getElementById("Namaste(Nepali)").innerHTML = Student.namaste(myname);
    // Call 'nihao()' on the class student
    document.getElementById("Nǐ hǎo(Chinese)").innerHTML = Student.nihao(myname);
    // Call 'greet()' can access the object since it is a static method and it can access the object properties
    document.getElementById("greet").innerHTML = Student.greet(myname);

           </script>
    
</body>
</html>
