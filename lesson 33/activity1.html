<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heera's Bank App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <h2>Bank Tracker</h2>
    
    <div class="balance-card">
        <p>Current Balance</p>
        <div id="balance">$0</div>
    </div>

    <div class="input-group">
        <input type="number" id="amountInput" placeholder="Enter amount (e.g. 50)">
    </div>

    <div class="button-group">
        <button class="btn-credit" onclick="processTransaction('credit')">Credit (+)</button>
        <button class="btn-debit" onclick="processTransaction('debit')">Debit (-)</button>
    </div>

    <div class="history">
        <h4>Recent Transactions</h4>
        <div id="transactionList"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
